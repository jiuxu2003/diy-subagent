<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1024 1024"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">DIY Subagent</title>
  <desc id="description"
  >Three connected agent cards on a blue and violet rounded square.</desc>
  <defs>
    <linearGradient
      id="background"
      x1="128"
      y1="96"
      x2="896"
      y2="928"
      gradientUnits="userSpaceOnUse"
    >
      <stop stop-color="#2563EB" />
      <stop offset="1" stop-color="#7C3AED" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="28"
        stdDeviation="24"
        flood-color="#111827"
        flood-opacity="0.28"
      />
    </filter>
  </defs>
  <rect
    x="64"
    y="64"
    width="896"
    height="896"
    rx="224"
    fill="url(#background)"
  />
  <g
    fill="none"
    stroke="#C4B5FD"
    stroke-linecap="round"
    stroke-width="44"
    opacity="0.9"
  >
    <path d="M512 360V488" />
    <path d="M320 640H704" />
    <path d="M320 640V704" />
    <path d="M704 640V704" />
  </g>
  <g filter="url(#shadow)">
    <rect x="320" y="192" width="384" height="240" rx="72" fill="#FFFFFF" />
    <rect x="160" y="640" width="320" height="224" rx="64" fill="#FFFFFF" />
    <rect x="544" y="640" width="320" height="224" rx="64" fill="#FFFFFF" />
  </g>
  <g fill="#4338CA">
    <circle cx="432" cy="304" r="32" />
    <circle cx="592" cy="304" r="32" />
    <rect x="416" y="352" width="192" height="28" rx="14" />
    <circle cx="256" cy="744" r="28" />
    <circle cx="384" cy="744" r="28" />
    <rect x="256" y="792" width="128" height="24" rx="12" />
    <circle cx="640" cy="744" r="28" />
    <circle cx="768" cy="744" r="28" />
    <rect x="640" y="792" width="128" height="24" rx="12" />
  </g>
</svg>
